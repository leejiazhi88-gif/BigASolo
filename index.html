 ctx.clearRect(0,0,w,h);const ex={p:extent('p'),n:extent('n'),e:extent('e')};
 const x=i=>m.l+i/(view.length-1)*cw,y=(v,k)=>m.t+ch-(v-ex[k][0])/(ex[k][1]-ex[k][0])*ch;
 ctx.font='11px Microsoft YaHei';ctx.textBaseline='middle';
 for(let i=0;i<=5;i++){const yy=m.t+i*ch/5;ctx.strokeStyle='#1b2c39';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(m.l,yy);ctx.lineTo(m.l+cw,yy);ctx.stroke();
  const pv=ex.p[1]-i*(ex.p[1]-ex.p[0])/5,nv=ex.n[1]-i*(ex.n[1]-ex.n[0])/5,ev=ex.e[1]-i*(ex.e[1]-ex.e[0])/5;
  ctx.fillStyle=COLORS.p;ctx.textAlign='right';ctx.fillText(pv.toFixed(1),m.l-9,yy);ctx.fillStyle=COLORS.n;ctx.textAlign='left';ctx.fillText(nv.toFixed(0),m.l+cw+9,yy);ctx.fillStyle=COLORS.e;ctx.fillText(ev.toFixed(0),m.l+cw+62,yy)}
 const ticks=Math.min(10,years*2);for(let i=0;i<=ticks;i++){const idx=Math.round(i*(view.length-1)/ticks);ctx.fillStyle='#718596';ctx.textAlign='center';ctx.fillText(view[idx].d.slice(0,7),x(idx),h-18)}
 for(const k of ['p','n','e']){if(!visible[k])continue;ctx.strokeStyle=COLORS[k];ctx.lineWidth=k==='p'?2.1:1.8;ctx.globalAlpha=k==='n'?.95:.88;ctx.beginPath();view.forEach((d,i)=>{const xx=x(i),yy=y(d[k],k);i?ctx.lineTo(xx,yy):ctx.moveTo(xx,yy)});ctx.stroke();ctx.globalAlpha=1}
 canvas._map={m,cw,ch,x,y,ex,w,h};
}
function hover(ev){const r=canvas.getBoundingClientRect(),mx=ev.clientX-r.left,{m,cw,x,y}=canvas._map;if(mx<m.l||mx>m.l+cw){tip.style.display='none';return}
 const i=Math.max(0,Math.min(view.length-1,Math.round((mx-m.l)/cw*(view.length-1)))),d=view[i],xx=x(i);
 draw();ctx.strokeStyle='#60788b';ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(xx,m.t);ctx.lineTo(xx,m.t+canvas._map.ch);ctx.stroke();ctx.setLineDash([]);
 for(const k of ['p','n','e'])if(visible[k]){ctx.fillStyle=COLORS[k];ctx.beginPath();ctx.arc(xx,y(d[k],k),4,0,Math.PI*2);ctx.fill()}
 tip.innerHTML=`<b>${d.d}</b><br><span style="color:${COLORS.p}">股价：${d.p.toFixed(2)} 元</span><br><span style="color:${COLORS.n}">滚动年利润：${d.n.toFixed(2)} 亿元</span><br><span style="color:${COLORS.e}">PE(TTM)：${d.e.toFixed(2)} 倍</span>`;
 tip.style.display='block';tip.style.left=Math.min(r.width-195,Math.max(8,xx+12))+'px';tip.style.top=Math.max(8,Math.min(r.height-120,ev.clientY-r.top-58))+'px';
}
document.getElementById('ranges').onclick=e=>{if(!e.target.dataset.y)return;years=+e.target.dataset.y;document.querySelectorAll('#ranges button').forEach(b=>b.classList.toggle('active',b===e.target));draw()};
document.querySelectorAll('[data-s]').forEach(c=>c.onchange=()=>{visible[c.dataset.s]=c.checked;draw()});
canvas.addEventListener('mousemove',hover);canvas.addEventListener('mouseleave',()=>{tip.style.display='none';draw()});addEventListener('resize',draw);draw();
</script></body></html>
